name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref so a rapid push series to a PR can't
# pile up parallel runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cross-platform packages + the non-Linux build paths (run_other, the
  # collector/enforcer stubs). Building for a non-Linux target excludes every
  # //go:build linux file, so this needs no eBPF codegen or kernel.
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - run: go mod download
      - name: Format check
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Cross-platform compile (excludes eBPF-tagged files)
        run: |
          GOOS=darwin  GOARCH=arm64 go build ./...
          GOOS=windows GOARCH=amd64 go build ./...
      - name: Vet pure packages
        run: go vet ./internal/policy/... ./internal/report/... ./internal/audit/... ./internal/event/... ./internal/monitor/... ./internal/enforcer/... ./internal/sarif/... ./internal/ingest/...
      # Dogfood: run our own test suite under the Egret Action (audit - monitors
      # the egress/exec/file behaviour of the toolchain + dependency code during the
      # tests, and never blocks CI). These are the pure packages (no eBPF collector),
      # so Egret's own eBPF load is the only one in play - no nesting.
      - name: Test with coverage (guarded by Egret, audit)
        uses: ./
        with:
          version: latest
          mode: audit
          upload-sarif: "false"
          command: |
            go test -coverprofile=coverage.out \
              ./internal/policy/... ./internal/report/... ./internal/audit/... \
              ./internal/event/... ./internal/monitor/... ./internal/enforcer/... \
              ./internal/sarif/... ./internal/ingest/...
            go tool cover -func=coverage.out | tail -1

  # Full Linux build + test using the COMMITTED bpf2go bindings (checked in and
  # embedded via go:embed) - needs no clang/bpftool/BTF. The regenerate-from-source
  # reproducibility check runs on the Linux dev VM, not on GitHub runners (their
  # kernel ships no matching bpftool to dump the CO-RE vmlinux.h).
  ebpf:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - run: go mod download
      - name: Build (from committed eBPF bindings)
        run: make build
      - name: Test (full tree, incl. cli/collector - needs generated bindings)
        run: go test ./...
      - name: Smoke test
        run: ./bin/egret version
      - name: Verify module checksums
        run: go mod verify
      - name: Vulnerability scan (govulncheck)
        # Per docs/DEPENDENCIES.md: fail CI on known-vulnerable dependencies.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...
