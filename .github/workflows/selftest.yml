# Action self-test (dogfood): run the Egret Action from THIS repo (`uses: ./`)
# against a sample build step, so every push proves the published action works
# end-to-end on a stock GitHub-hosted runner: download + checksum-verify the
# released binary, load eBPF, monitor a command, emit report + SARIF.
name: Action self-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Egret guards its own build (audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write   # upload the SARIF to Code Scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Egret over a sample command
        id: egret
        uses: ./
        with:
          version: latest          # download + verify the newest released binary
          mode: audit
          command: |
            echo "guarded build step"
            curl -fsS https://example.com -o /dev/null

      - name: Assert the action produced a report + outputs
        env:
          REPORT_DIR: ${{ steps.egret.outputs.report-dir }}
          VIOLATIONS: ${{ steps.egret.outputs.violations }}
        run: |
          echo "report-dir=${REPORT_DIR}  violations=${VIOLATIONS}"
          test -n "${REPORT_DIR}" || { echo "::error::no report-dir output"; exit 1; }
          test -f "${REPORT_DIR}/report.json" || { echo "::error::report.json missing"; exit 1; }
          [[ "${VIOLATIONS}" =~ ^[0-9]+$ ]] || { echo "::error::violations output not numeric"; exit 1; }
          echo "self-test OK: Egret installed, ran under eBPF, and produced a report."

  # App-token publish path: mint an Egret Security App installation token in-workflow
  # (server-less) and let the action publish a branded check + dashboard issue as
  # egret-security-app[bot]. Manual (workflow_dispatch) so it doesn't post on every push.
  app-token:
    name: App-token publish (egret-security-app[bot])
    # Manual, or on a SAME-REPO pull request (fork PRs can't read the App secrets).
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write   # upload SARIF (the PR path exercises the full experience)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Mint Egret App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.EGRET_APP_ID }}
          private-key: ${{ secrets.EGRET_APP_PRIVATE_KEY }}
          # Least-privilege: request only what the publish features need, not the
          # App's blanket installation permissions.
          permission-checks: write
          permission-issues: write
          permission-pull-requests: write
          permission-contents: read

      - name: Run Egret + publish results via the App token
        uses: ./
        with:
          version: latest
          mode: audit
          github-token: ${{ steps.app-token.outputs.token }}
          check-run: true
          pr-comment: true          # posts only on pull_request events (entrypoint guards)
          dashboard-issue: true
          command: |
            echo "app-token test build"
            curl -fsS https://example.com -o /dev/null

  # Block mode: prove the enforcer actually confines egress on a real runner.
  # Manual (workflow_dispatch) because block mode may not confine on hosted runners
  # (the self-probe aborts fail-closed if it can't) - we want to see that outcome.
  block:
    name: Egret enforces block mode (disallowed egress blocked)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Write a block policy allowing only example.com
        run: |
          cat > "${RUNNER_TEMP}/egret-policy.yaml" <<'YAML'
          version: 1
          mode: block
          egress:
            allowed-endpoints:
              - example.com
            block-raw-ip: true
          YAML

      - name: Run a build hitting an allowed + a disallowed endpoint
        id: egret
        continue-on-error: true   # we assert on the outcome ourselves
        uses: ./
        with:
          version: latest
          mode: block
          policy: ${{ runner.temp }}/egret-policy.yaml
          upload-sarif: "false"
          command: |
            echo "== allowed: example.com =="
            curl -fsS --max-time 20 https://example.com -o /dev/null && echo "example.com OK"
            echo "== disallowed: api.github.com =="
            curl -fsS --max-time 20 https://api.github.com -o /dev/null \
              && echo "::warning::reached api.github.com (NOT blocked)" \
              || echo "api.github.com connection failed (expected under block mode)"

      - name: Assert enforcement
        env:
          OUTCOME: ${{ steps.egret.outcome }}
          VIOLATIONS: ${{ steps.egret.outputs.violations }}
          REPORT_DIR: ${{ steps.egret.outputs.report-dir }}
        run: |
          echo "egret step outcome: ${OUTCOME}"
          V="${VIOLATIONS}"
          echo "violations=${V:-<none>}  report-dir=${REPORT_DIR}"
          # Block mode should record >=1 violation for the disallowed api.github.com egress.
          # If Egret's self-probe finds it can't confine this runner it aborts fail-closed
          # (the action step fails) - this assertion surfaces that rather than hiding it.
          if [ "${V:-0}" -ge 1 ]; then
            echo "block-mode enforcement confirmed (${V} violation(s))."
          else
            echo "::error::no violations - block mode did not confine egress on this runner (hosted-runner limitation or self-probe abort)."
            exit 1
          fi
