# Release: build the Linux binary + SHA256SUMS on a version tag, and publish a
# GitHub Release. The Egret Action's installer downloads `egret_linux_amd64` and
# verifies it against `SHA256SUMS` (fail-closed), so BOTH assets, with these exact
# names, must be published here.
name: release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual re-run of an EXISTING tag's release (e.g. a prior run failed partway).
  # Supply the already-pushed tag; the job checks it out and (re)publishes. It does
  # NOT create tags - the tag must already exist (the release step --verify-tag's it).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to (re)release, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

# Serialize per-tag so a double/re-push (or a manual re-run) can't race two publishes.
concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    # Pin the runner image on the trust path: the release binary must build on a
    # known, reproducible OS rather than a moving `ubuntu-latest`. Bump this
    # deliberately when GitHub deprecates the image (SLSA provenance also records
    # the exact runner). CI/test jobs keep `ubuntu-latest` for auto-patching.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # `release` is a protected GitHub Environment: add required reviewers (+ an
    # optional wait timer) in repo Settings → Environments so a tag push can't
    # publish the trust artifact unattended. Referencing a not-yet-created
    # environment is harmless (created unprotected until you add rules).
    environment: release
    permissions:
      contents: write      # create the GitHub Release + upload assets
      id-token: write      # OIDC for keyless SLSA provenance
      attestations: write  # store the build provenance attestation
    # Resolve the tag once: on a tag push it's the pushed tag; on a manual dispatch
    # it's the typed input (github.ref_name would be the branch, not a tag).
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      # Don't persist the ambient GITHUB_TOKEN into .git/config: nothing here does
      # git-level writes (the release step uses its own GH_TOKEN), and the build
      # runs third-party toolchain/module code that must not see push credentials.
      - name: Validate release tag format
        run: |
          # Reject anything that isn't vMAJOR.MINOR.PATCH before we check out that
          # ref or spend ~20 min building - guards a mistyped manual-dispatch input
          # (e.g. a branch name) from reaching checkout/build/publish.
          [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::TAG '${TAG}' is not a vMAJOR.MINOR.PATCH release tag."; exit 1; }

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Pin the patched toolchain (crypto/tls GO-2026-5856 + related stdlib
          # advisories, all fixed in go1.26.5) so the trust artifact is built vuln-free.
          go-version: "1.26.5"
          # No build cache on the release/trust path: a cache entry populated by a
          # lower-privileged workflow (PR) must not be restorable here (cache poisoning).
          cache: false

      - name: Build static binary (from committed eBPF bindings)
        env:
          VERSION: ${{ env.TAG }}
        # bpf2go output is checked in + embedded via go:embed, so the release binary
        # builds with no clang/bpftool/BTF on the runner (the runner kernel has no
        # matching bpftool anyway).
        run: make build-static VERSION="${VERSION}"

      - name: Package assets (egret_linux_amd64 + SHA256SUMS)
        run: |
          cp bin/egret egret_linux_amd64
          sha256sum egret_linux_amd64 > SHA256SUMS
          echo "--- SHA256SUMS ---"; cat SHA256SUMS
          # Sanity: the Action installer greps this exact asset name.
          grep -qE "  ?egret_linux_amd64$" SHA256SUMS

      # SLSA build provenance (keyless, OIDC) - lets consumers verify the binary was
      # built by this workflow:  gh attestation verify egret_linux_amd64 --repo NX1X/Egret
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "egret_linux_amd64, SHA256SUMS"

      # Keyless cosign signature of SHA256SUMS (Sigstore: a short-lived Fulcio cert
      # bound to this workflow's OIDC identity + a Rekor transparency-log entry, no
      # private key to store or rotate). cosign v3+ emits ONE Sigstore bundle
      # (signature + certificate + tlog entry) via --bundle. SHA256SUMS already covers
      # the binary, so signing it transitively signs the binary, PROVIDED the consumer
      # also checks the binary against it. Full verify of a download:
      #   cosign verify-blob --bundle SHA256SUMS.bundle \
      #     --certificate-identity-regexp '^https://github.com/NX1X/Egret/\.github/workflows/release\.yml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com SHA256SUMS
      #   sha256sum -c SHA256SUMS         # <-- ties the signed digest to the binary
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign SHA256SUMS (keyless)
        run: |
          cosign sign-blob --yes \
            --bundle SHA256SUMS.bundle \
            SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Release notes come from the matching CHANGELOG.md section (curated, per
          # "Keep a Changelog"); fall back to auto-generated notes if this version has
          # no section yet. Keep CHANGELOG.md updated per release for rich release notes.
          VER="${TAG#v}"
          NOTES="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="${VER}" '
            $0 ~ ("^## \\[" ver "\\]") { g=1; print; next }
            g && (/^## \[/ || /^\[[0-9]/) { exit }
            g { print }
          ' CHANGELOG.md > "${NOTES}" || true
          notes_args=(--generate-notes)
          [ -s "${NOTES}" ] && notes_args=(--notes-file "${NOTES}")
          # Idempotent so a manual re-run of an existing tag republishes cleanly:
          # refresh notes (when a section exists) + re-upload assets (--clobber).
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists - updating notes + re-uploading assets."
            [ -s "${NOTES}" ] && gh release edit "${TAG}" --notes-file "${NOTES}"
            gh release upload "${TAG}" \
              egret_linux_amd64 SHA256SUMS SHA256SUMS.bundle --clobber
          else
            gh release create "${TAG}" \
              egret_linux_amd64 SHA256SUMS SHA256SUMS.bundle \
              --title "${TAG}" \
              "${notes_args[@]}" \
              --verify-tag
          fi

  # Two independent verification paths ship with every release:
  #   1. SLSA build provenance (actions/attest-build-provenance):
  #        gh attestation verify egret_linux_amd64 --repo NX1X/Egret
  #   2. Keyless cosign signature of SHA256SUMS (SHA256SUMS.bundle):
  #        cosign verify-blob --bundle SHA256SUMS.bundle \
  #          --certificate-identity-regexp '^https://github.com/NX1X/Egret/\.github/workflows/release\.yml@.*' \
  #          --certificate-oidc-issuer https://token.actions.githubusercontent.com SHA256SUMS
  #        sha256sum -c SHA256SUMS      # then confirm the binary matches the signed digest
