<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" role="img" aria-label="Egret - runtime egress security">
  <title>Egret</title>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13293D"/>
      <stop offset="1" stop-color="#0B1B2B"/>
    </linearGradient>
    <linearGradient id="egress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <!-- self-contained dark card: the light wordmark stays legible on any page background -->
  <rect x="0" y="0" width="640" height="180" rx="28" fill="url(#card)"/>
  <rect x="1" y="1" width="638" height="178" rx="27" fill="none" stroke="#1E3A52" stroke-width="2"/>

  <!-- icon mark (256 grid) scaled into the left of the card -->
  <g transform="translate(26,42) scale(0.52)">
    <line x1="36" y1="204" x2="214" y2="204" stroke="url(#egress)" stroke-width="9" stroke-linecap="round"/>
    <circle cx="214" cy="204" r="9" fill="#2DD4BF"/>
    <g stroke="#F5F7FA" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M108 168 L103 204"/>
      <path d="M122 170 L126 204"/>
      <path d="M103 204 l11 3"/>
      <path d="M126 204 l11 3"/>
    </g>
    <path d="M52 124 C78 112 118 116 138 132 C151 143 151 160 137 169
             C120 180 92 180 78 167 C70 159 63 150 60 142 C58 137 54 130 52 124 Z"
          fill="#F5F7FA"/>
    <g fill="none" stroke="#F5F7FA" stroke-width="4" stroke-linecap="round" opacity="0.85">
      <path d="M84 122 C64 112 48 111 34 116"/>
      <path d="M92 129 C72 123 54 125 40 133"/>
    </g>
    <path d="M126 134 C118 110 146 110 140 90 C136 76 150 64 166 63"
          fill="none" stroke="#F5F7FA" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="169" cy="61" r="11" fill="#F5F7FA"/>
    <path d="M162 54 C150 42 138 40 126 43" fill="none" stroke="#F5F7FA" stroke-width="5" stroke-linecap="round"/>
    <path d="M177 57 L213 54 L179 70 Z" fill="#F5B54B"/>
  </g>

  <!-- wordmark -->
  <text x="168" y="100" font-family="'Space Grotesk','Inter Tight',Inter,system-ui,sans-serif"
        font-size="70" font-weight="700" letter-spacing="-1.5" fill="#F5F7FA">Egret</text>
  <text x="170" y="134" font-family="Inter,system-ui,sans-serif"
        font-size="21" font-weight="500" letter-spacing="0.5" fill="#2DD4BF">runtime egress security</text>
</svg>
