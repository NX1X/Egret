<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Egret — runtime egress security for CI/CD">
  <title>Egret</title>
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13293D"/>
      <stop offset="1" stop-color="#08131F"/>
    </linearGradient>
    <linearGradient id="pline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#pbg)"/>
  <!-- faint egress traffic lines -->
  <g stroke="url(#pline)" stroke-width="2" opacity="0.18">
    <line x1="0" y1="150" x2="1280" y2="150"/>
    <line x1="0" y1="230" x2="1280" y2="230"/>
    <line x1="0" y1="470" x2="1280" y2="470"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
  </g>

  <!-- icon mark -->
  <g transform="translate(150,190) scale(1.0)">
    <rect x="0" y="0" width="256" height="256" rx="56" fill="#0B1B2B" stroke="#1E3A52" stroke-width="2"/>
    <line x1="34" y1="214" x2="196" y2="214" stroke="#2DD4BF" stroke-width="9" stroke-linecap="round"/>
    <circle cx="196" cy="214" r="8" fill="#2DD4BF"/>
    <g stroke="#F5F7FA" stroke-width="5" stroke-linecap="round">
      <path d="M104 160 L82 186"/>
      <path d="M112 162 L94 190"/>
    </g>
    <path d="M98 152 C84 155 72 156 62 154 C74 148 86 148 100 150 Z" fill="#F5F7FA"/>
    <ellipse cx="118" cy="152" rx="27" ry="14" fill="#F5F7FA"/>
    <path d="M120 146 C124 108 150 80 188 66 C172 100 152 126 140 150 C132 152 124 150 120 146 Z" fill="#F5F7FA"/>
    <path d="M138 150 C160 150 158 134 176 132" fill="none" stroke="#F5F7FA" stroke-width="12" stroke-linecap="round"/>
    <circle cx="180" cy="131" r="10" fill="#F5F7FA"/>
    <path d="M189 126 L222 130 L189 138 Z" fill="#F5B54B"/>
  </g>

  <!-- title block -->
  <text x="470" y="270" font-family="'Space Grotesk','Inter Tight',Inter,system-ui,sans-serif"
        font-size="128" font-weight="700" letter-spacing="-3" fill="#F5F7FA">Egret</text>
  <text x="474" y="330" font-family="Inter,system-ui,sans-serif"
        font-size="34" font-weight="500" fill="#2DD4BF">Runtime egress security for CI/CD &amp; Linux hosts</text>

  <!-- feature chips (two rows) -->
  <g font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="600" fill="#CBD5E1">
    <!-- row 1: what it does -->
    <rect x="474" y="360" width="250" height="52" rx="26" fill="#0B1B2B" stroke="#234"/>
    <text x="500" y="393">eBPF egress filter</text>
    <rect x="742" y="360" width="224" height="52" rx="26" fill="#0B1B2B" stroke="#234"/>
    <text x="768" y="393">audit</text>
    <path d="M838 386 h20 m-7 -6 l7 6 l-7 6" fill="none" stroke="#CBD5E1" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="866" y="393">policy</text>
    <!-- row 2: how you run it -->
    <rect x="474" y="424" width="224" height="52" rx="26" fill="#0B1B2B" stroke="#234"/>
    <text x="500" y="457">GitHub Action</text>
    <rect x="716" y="424" width="192" height="52" rx="26" fill="#0B1B2B" stroke="#234"/>
    <text x="742" y="457">GitHub App</text>
  </g>

  <text x="474" y="524" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#7C93A8">
    No server · no account · no phone-home · Apache-2.0</text>
</svg>
