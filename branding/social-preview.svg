<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Egret — runtime egress security for CI/CD">
  <title>Egret</title>
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13293D"/>
      <stop offset="1" stop-color="#08131F"/>
    </linearGradient>
    <linearGradient id="pline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#pbg)"/>
  <!-- faint egress traffic lines -->
  <g stroke="url(#pline)" stroke-width="2" opacity="0.18">
    <line x1="0" y1="150" x2="1280" y2="150"/>
    <line x1="0" y1="230" x2="1280" y2="230"/>
    <line x1="0" y1="470" x2="1280" y2="470"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
  </g>

  <!-- icon mark -->
  <g transform="translate(150,190) scale(1.0)">
    <rect x="0" y="0" width="256" height="256" rx="56" fill="#0B1B2B" stroke="#1E3A52" stroke-width="2"/>
    <line x1="36" y1="204" x2="214" y2="204" stroke="#2DD4BF" stroke-width="9" stroke-linecap="round"/>
    <circle cx="214" cy="204" r="9" fill="#2DD4BF"/>
    <g stroke="#F5F7FA" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M108 168 L103 204"/>
      <path d="M122 170 L126 204"/>
      <path d="M103 204 l11 3"/>
      <path d="M126 204 l11 3"/>
    </g>
    <path d="M52 124 C78 112 118 116 138 132 C151 143 151 160 137 169
             C120 180 92 180 78 167 C70 159 63 150 60 142 C58 137 54 130 52 124 Z"
          fill="#F5F7FA"/>
    <g fill="none" stroke="#F5F7FA" stroke-width="4" stroke-linecap="round" opacity="0.85">
      <path d="M84 122 C64 112 48 111 34 116"/>
      <path d="M92 129 C72 123 54 125 40 133"/>
    </g>
    <path d="M126 134 C118 110 146 110 140 90 C136 76 150 64 166 63"
          fill="none" stroke="#F5F7FA" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="169" cy="61" r="11" fill="#F5F7FA"/>
    <path d="M162 54 C150 42 138 40 126 43" fill="none" stroke="#F5F7FA" stroke-width="5" stroke-linecap="round"/>
    <path d="M177 57 L213 54 L179 70 Z" fill="#F5B54B"/>
  </g>

  <!-- title block -->
  <text x="470" y="270" font-family="'Space Grotesk','Inter Tight',Inter,system-ui,sans-serif"
        font-size="128" font-weight="700" letter-spacing="-3" fill="#F5F7FA">Egret</text>
  <text x="474" y="330" font-family="Inter,system-ui,sans-serif"
        font-size="34" font-weight="500" fill="#2DD4BF">Runtime egress security for CI/CD &amp; Linux hosts</text>

  <!-- feature chips -->
  <g font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="600" fill="#CBD5E1">
    <rect x="474" y="372" width="230" height="52" rx="26" fill="#0B1B2B" stroke="#234"/>
    <text x="500" y="405">eBPF egress filter</text>
    <rect x="722" y="372" width="200" height="52" rx="26" fill="#0B1B2B" stroke="#234"/>
    <text x="748" y="405">audit</text>
    <path d="M818 398 h20 m-7 -6 l7 6 l-7 6" fill="none" stroke="#CBD5E1" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="850" y="405">policy</text>
    <rect x="940" y="372" width="170" height="52" rx="26" fill="#0B1B2B" stroke="#234"/>
    <text x="966" y="405">GitHub Action</text>
  </g>

  <text x="474" y="470" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#7C93A8">
    No server · no account · no phone-home · Apache-2.0</text>
</svg>
