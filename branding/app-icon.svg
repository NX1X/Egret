<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Egret app icon">
  <title>Egret</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173A54"/>
      <stop offset="1" stop-color="#0B1B2B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.58" cy="0.8" r="0.7">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="egress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.5"/>
      <stop offset="0.35" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#5FEAD9"/>
    </linearGradient>
  </defs>

  <!-- rounded product tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="#2DD4BF" stroke-opacity="0.16" stroke-width="2"/>

  <!-- the mark, scaled from the 256 grid and centred with tile padding -->
  <g transform="translate(56,47) scale(1.7)">
    <line x1="34" y1="205" x2="208" y2="205" stroke="url(#egress)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="208" cy="205" r="10" fill="#5FEAD9"/>

    <g stroke="#F5F7FA" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M112 171 L106 205"/>
      <path d="M126 173 L131 205"/>
      <path d="M106 205 l11 3"/>
      <path d="M131 205 l11 3"/>
    </g>

    <g fill="none" stroke="#F5F7FA" stroke-linecap="round">
      <path d="M122 127 C88 116 54 122 20 143" stroke-width="3" opacity="0.92"/>
      <path d="M120 133 C86 125 52 134 22 155" stroke-width="2.6" opacity="0.82"/>
      <path d="M116 140 C84 135 54 146 28 164" stroke-width="2.2" opacity="0.72"/>
      <path d="M112 146 C84 143 58 154 34 170" stroke-width="1.9" opacity="0.6"/>
    </g>

    <path d="M44 150 C64 131 104 127 136 141 C150 148 150 162 138 170
             C116 181 84 181 68 169 C56 160 46 155 44 150 Z" fill="#F5F7FA"/>

    <path d="M138 143 C150 121 150 107 135 97 C123 89 128 69 148 57
             C156 52 162 50 168 50"
          fill="none" stroke="#F5F7FA" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="170" cy="49" r="9.5" fill="#F5F7FA"/>
    <path d="M164 43 C154 33 146 32 137 35" fill="none" stroke="#F5F7FA" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M178 46 L216 48 L179 57 Z" fill="#F5B54B"/>
  </g>
</svg>
